repos:
  - repo: local
    hooks:
      - id: copyright-fix
        name: //:copyright-fix
        entry: bazel run //:copyright-fix
        language: system
        pass_filenames: false
      - id: format-fix
        name: //:format.fix
        entry: bazel run //:format.fix
        language: system
        files: (BUILD|BUILD\.bazel|WORKSPACE|\.bazelrc|[^/]+\.(py|bzl|bazel|yaml|yml|rs))$
        pass_filenames: false
      - id: generate-compile-commands
        name: bazel-compile-commands (for clang-tidy)
        entry: bazel-compile-commands
        language: system
        files: \.(c|cpp|h|hpp)$
        pass_filenames: false
  - repo: https://github.com/pocc/pre-commit-hooks
    rev: v1.3.5
    hooks:
      - id: clang-format
        args: ["-i", "--style=file"]
        files: \.(c|cpp|h|hpp)$
      - id: clang-tidy
        args: ["--config-file=.clang-tidy", "-p=$(pwd)", "--warnings-as-errors=*"]
        exclude: '(_test\.cpp|test_.*\.cpp)$'
